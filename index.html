<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הפסקות צהריים</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0A1A2F;
      --surface: #FFFFFF;
      --bg:      #F4F6FA;
      --accent:  #6161FF;
      --on-accent: #FFFFFF;
      --text:    #0A1A2F;
      --muted:   #64748B;
      --border:  rgba(10,26,47,0.1);
      --green:   #16a34a;
      --green-bg:#f0fdf4;
      --red:     #dc2626;
      --red-bg:  #fef2f2;
      --shadow:  0 4px 12px rgba(10,26,47,0.08);
    }

    html, body {
      font-family: 'Heebo', 'Assistant', Arial, sans-serif;
      font-size: 16px;
      line-height: 1.55;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }

    /* ══ HEADER ══ */
    header {
      background: var(--navy);
      color: #fff;
      padding: 14px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      box-shadow: 0 1px 0 rgba(255,255,255,0.06);
    }
    header h1 {
      font-family: 'Heebo', 'Assistant', Arial, sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    #header-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

    #clock {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      padding: 4px 12px;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.06em;
      font-feature-settings: "tnum";
      direction: ltr;
    }
    #sync-indicator {
      font-size: 12px; font-weight: 700;
      padding: 4px 10px; border-radius: 99px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.12);
      transition: all 0.3s;
    }
    #sync-indicator.ok    { background:rgba(22,163,74,0.25);  color:#86efac; border-color:rgba(22,163,74,0.3); }
    #sync-indicator.error { background:rgba(220,38,38,0.25);  color:#fca5a5; border-color:rgba(220,38,38,0.3); }
    #sync-indicator.busy  { background:rgba(97,97,255,0.25);  color:#c7d2fe; border-color:rgba(97,97,255,0.3); }

    #user-badge {
      background: var(--accent);
      color: var(--on-accent);
      border-radius: 4px;
      padding: 4px 12px;
      font-weight: 700;
      font-size: 14px;
    }
    .header-btn {
      border-radius: 4px;
      padding: 5px 14px;
      font-family: 'Heebo', 'Assistant', Arial, sans-serif;
      font-size: 13px; font-weight: 700;
      cursor: pointer; border: none;
    }
    #btn-logout {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.25) !important;
      color: #fff;
    }
    #btn-logout:hover { background: rgba(255,255,255,0.08); }
    #btn-plasma { background: var(--accent); color: #fff; display:none; }
    #btn-plasma:hover { background: #4f4fdd; }

    /* ══ SETUP BANNER ══ */
    #setup-banner { display:none; }

    /* ══ MAIN ══ */
    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    .shift-section { margin-bottom: 32px; }
    .shift-title {
      font-family: 'Heebo', 'Assistant', Arial, sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted);
      border-inline-start: 3px solid var(--accent);
      padding-inline-start: 10px;
      margin-bottom: 14px;
    }
    .slots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px;
    }

    /* ══ SLOT CARD ══ */
    .slot-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 18px;
      display: flex; flex-direction: column;
      gap: 8px;
      box-shadow: 0 1px 0 rgba(10,26,47,0.04);
      transition: border-color 0.15s, box-shadow 0.15s;
      position: relative; overflow: hidden;
    }
    .slot-card::before {
      content:''; position:absolute;
      top:0; inset-inline-start:0;
      width:3px; height:100%;
      background: var(--accent);
    }
    .slot-card.drag-over {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(97,97,255,0.15);
    }
    .slot-card.full::before { background: var(--red); }

    .slot-time {
      font-size: 17px; font-weight: 800;
      color: var(--accent);
      direction: ltr; line-height: 1;
    }
    .slot-cap {
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.06em; color: var(--muted);
    }
    .slot-cap.full-cap { color: var(--red); }

    /* Agent badges */
    .agent-list { list-style:none; display:flex; flex-direction:column; gap:4px; min-height:28px; flex:1; }
    .agent-badge {
      display:flex; align-items:center; justify-content:space-between;
      background: var(--bg);
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 15px; font-weight: 700;
      cursor: default; user-select:none;
    }
    .agent-badge.own {
      background: rgba(97,97,255,0.07);
      border-color: rgba(97,97,255,0.25);
      color: var(--accent);
      cursor: grab;
    }
    .agent-badge.admin-view { cursor: grab; }
    .agent-badge.dragging { opacity: 0.35; }

    .remove-btn {
      background:none; border:none; cursor:pointer;
      font-size:14px; color:#bbb; padding:0 2px; line-height:1;
      display:none; transition: color 0.15s;
    }
    .remove-btn:hover { color: var(--red); }
    .agent-badge.own .remove-btn,
    .agent-badge.admin-view .remove-btn { display:inline; }

    /* Add Me */
    .btn-add-me {
      background: var(--accent); color: var(--on-accent);
      border: none; border-radius: 4px;
      padding: 8px 0; width: 100%;
      font-family: 'Heebo', 'Assistant', Arial, sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-add-me:hover    { background: #4f4fdd; }
    .btn-add-me:disabled { background: #a5b4fc; cursor: not-allowed; }

    .spinner {
      width:14px; height:14px;
      border:2px solid rgba(255,255,255,0.35);
      border-top-color:#fff;
      border-radius:50%;
      animation:spin 0.7s linear infinite;
      display:inline-block; flex-shrink:0;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    .slot-card.loading { pointer-events:none; opacity:0.65; }

    /* ══ LOGIN ══ */
    #login-screen {
      position:fixed; inset:0;
      background: rgba(10,26,47,0.5);
      backdrop-filter: blur(4px);
      display:flex; align-items:center; justify-content:center;
      z-index:900;
    }
    .login-card {
      background: var(--surface);
      border-radius: 8px;
      box-shadow: var(--shadow), 0 0 0 1px var(--border);
      padding: 36px;
      width:100%; max-width:380px;
      display:flex; flex-direction:column; gap:20px;
    }
    .login-card h2 {
      font-family:'Space Grotesk','Heebo',sans-serif;
      font-size:26px; font-weight:700; letter-spacing:-0.01em;
    }
    .login-card p { font-size:15px; color:var(--muted); }
    .field-group { display:flex; flex-direction:column; gap:5px; }
    .field-group label { font-size:14px; font-weight:700; }
    .field-group input {
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family:'Heebo',sans-serif;
      font-size: 16px;
      outline:none;
      unicode-bidi:plaintext;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(97,97,255,0.16);
    }
    .btn-primary {
      background: var(--navy); color: #fff;
      border:none; border-radius:4px;
      padding: 12px 20px;
      font-family:'Heebo',sans-serif;
      font-size:16px; font-weight:700;
      cursor:pointer; transition:background 0.15s;
    }
    .btn-primary:hover { background: #1a2f4a; }
    #login-warning { color:var(--red); font-size:13px; display:none; }

    /* ══ ADMIN PANEL ══ */
    #admin-panel {
      display:none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 22px;
      margin-bottom: 28px;
      box-shadow: 0 1px 0 rgba(10,26,47,0.04);
    }
    .admin-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:16px; flex-wrap:wrap; gap:10px;
    }
    .admin-header h2 {
      font-family:'Space Grotesk','Heebo',sans-serif;
      font-size:18px; font-weight:700;
    }
    .admin-actions { display:flex; flex-wrap:wrap; gap:8px; }
    .btn-danger {
      background:var(--red); color:#fff;
      border:none; border-radius:4px;
      padding:8px 16px;
      font-family:'Heebo',sans-serif; font-weight:700; font-size:14px;
      cursor:pointer;
    }
    .btn-danger:hover { background:#b91c1c; }
    .btn-secondary {
      background:var(--bg); color:var(--text);
      border:1px solid var(--border);
      border-radius:4px; padding:8px 16px;
      font-family:'Heebo',sans-serif; font-weight:700; font-size:14px;
      cursor:pointer;
    }
    .btn-secondary:hover { background:#e8ecf4; }

    .admin-slot-row {
      background:var(--bg);
      border-radius:6px; padding:12px 14px;
      margin-bottom:8px;
    }
    .admin-slot-row h3 { font-size:14px; font-weight:700; margin-bottom:8px; color:var(--muted); }
    .admin-agents-wrap { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
    .admin-agent-tag {
      display:inline-flex; align-items:center; gap:4px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:4px; padding:3px 8px;
      font-size:14px; font-weight:700;
    }
    .admin-tag-btn {
      background:none; border:none; cursor:pointer;
      font-size:13px; padding:0 1px; line-height:1;
      transition:color 0.15s;
    }
    .admin-tag-btn.rename  { color:var(--muted); }
    .admin-tag-btn.rename:hover  { color:var(--accent); }
    .admin-tag-btn.move    { color:var(--muted); }
    .admin-tag-btn.move:hover    { color:var(--accent); }
    .admin-tag-btn.disconnect { color:var(--muted); }
    .admin-tag-btn.disconnect:hover { color:#d97706; }
    .admin-tag-btn.remove  { color:var(--muted); }
    .admin-tag-btn.remove:hover  { color:var(--red); }

    .admin-add-row { display:flex; gap:6px; }
    .admin-add-row input {
      flex:1; padding:7px 10px;
      border:1px solid var(--border);
      border-radius:4px;
      font-family:'Heebo',sans-serif; font-size:14px;
      outline:none; unicode-bidi:plaintext;
    }
    .admin-add-row input:focus {
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(97,97,255,0.14);
    }
    .admin-add-row button {
      background:var(--accent); color:#fff;
      border:none; border-radius:4px;
      padding:7px 14px;
      font-family:'Heebo',sans-serif; font-weight:700; font-size:14px;
      cursor:pointer;
    }
    .admin-add-row button:hover { background:#4f4fdd; }

    /* ══ PLASMA ══ */
    #plasma-resize {
      display:none; position:fixed;
      bottom:0; inset-inline-start:0; inset-inline-end:0;
      background:var(--navy); padding:4px 16px;
      gap:8px; justify-content:center;
    }
    #plasma-resize button {
      background:rgba(255,255,255,0.1); color:#fff;
      border:none; border-radius:4px;
      padding:4px 14px;
      font-family:'Heebo',sans-serif; font-size:13px;
      cursor:pointer;
    }

    @media (max-width:600px) {
      header { padding:12px 16px; }
      main   { padding:16px; }
    }
  </style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-card">
    <h2>הפסקות צהריים</h2>
    <p>הזינו את שמכם פעם אחת — הדפדפן יזכור אתכם.</p>
    <div class="field-group">
      <label for="input-name">שם *</label>
      <input type="text" id="input-name" placeholder="לדוגמה: דנה כהן" autocomplete="off">
    </div>
    <span id="login-warning"></span>
    <button class="btn-primary" id="btn-login">כניסה</button>
  </div>
</div>

<!-- ══ HEADER ══ -->
<header>
  <h1>הפסקות צהריים</h1>
  <div id="header-right">
    <span id="clock">--:--:--</span>
    <span id="sync-indicator">מחכה...</span>
    <span id="user-badge" style="display:none"></span>
    <button class="header-btn" id="btn-plasma" title="פלזמה">פלזמה</button>
    <button class="header-btn" id="btn-logout" style="display:none">יציאה</button>
  </div>
</header>

<!-- hidden setup banner (not shown) -->
<div id="setup-banner">
  <input type="text" id="input-script-url">
  <button id="btn-save-url"></button>
</div>

<main>
  <!-- ADMIN PANEL -->
  <div id="admin-panel">
    <div class="admin-header">
      <h2>🛠 פאנל מנהל</h2>
      <div class="admin-actions">
        <button class="btn-danger"    id="btn-clear-all">נקה הכל</button>
        <button class="btn-secondary" id="btn-export-csv">ייצוא CSV</button>
        <button class="btn-secondary" id="btn-refresh">רענן</button>
      </div>
    </div>
    <div id="admin-slots-list"></div>
  </div>

  <!-- MORNING -->
  <section class="shift-section">
    <h2 class="shift-title">משמרת בוקר</h2>
    <div class="slots-grid" id="grid-morning"></div>
  </section>

  <!-- AFTERNOON -->
  <section class="shift-section">
    <h2 class="shift-title">משמרת ערב</h2>
    <div class="slots-grid" id="grid-afternoon"></div>
  </section>
</main>

<div id="plasma-resize">
  <button onclick="window.resizeTo(320,240)">קטן</button>
  <button onclick="window.resizeTo(640,480)">גדול</button>
</div>

<script>
/* ══ CONFIG ══ */
const SCRIPT_URL_KEY = 'lunchScriptUrl';
const ADMIN_TOKEN    = 'lunch2026';
const ADMIN_NAMES    = ['פאול פופוביץ', 'ארז מליחי'];
const PLASMA_NAME    = 'פלזמה';
const SAVED_USER_KEY = 'lunchSavedUser';
const HARDCODED_URL  = 'https://script.google.com/macros/s/AKfycbyaQDzKKTrIctMzSYKvr1BbMRZe5SfPfgzYfppwiZveiT0P1tfEj0NX5oZrrkyGcC3F/exec';
const POLL_INTERVAL  = 8000;

const SLOTS = [
  { id:'A', label:'א', time:'11:50–12:30', maxAgents:3, shift:'morning'   },
  { id:'B', label:'ב', time:'12:40–13:20', maxAgents:3, shift:'morning'   },
  { id:'C', label:'ג', time:'13:30–14:10', maxAgents:3, shift:'morning'   },
  { id:'D', label:'ד', time:'14:10–14:50', maxAgents:3, shift:'morning'   },
  { id:'E', label:'ה', time:'15:00–15:40', maxAgents:1, shift:'afternoon' },
  { id:'F', label:'ו', time:'16:00–16:40', maxAgents:1, shift:'afternoon' },
];

/* ══ STATE ══ */
let currentUser  = null;
let isAdmin      = false;
let isPlasma     = false;
let serverState  = {};
let draggedAgent = null;
let dragFromSlot = null;
let pollTimer    = null;
const isPlasmaWindow = new URLSearchParams(location.search).get('plasma') === '1';

/* ══ URL ══ */
function getScriptUrl() { return localStorage.getItem(SCRIPT_URL_KEY) || HARDCODED_URL; }
function setScriptUrl(u){ localStorage.setItem(SCRIPT_URL_KEY, u.trim()); }
function checkSetupBanner() { document.getElementById('setup-banner').style.display='none'; }
document.getElementById('btn-save-url').addEventListener('click', () => {
  const u = document.getElementById('input-script-url').value.trim();
  if (!u.startsWith('https://script.google.com')) return;
  setScriptUrl(u); checkSetupBanner(); syncFromServer();
});

/* ══ SYNC STATUS ══ */
function setSyncStatus(status, text) {
  const el = document.getElementById('sync-indicator');
  el.className = status; el.textContent = text;
}

/* ══ FETCH ══ */
async function syncFromServer() {
  const url = getScriptUrl(); if (!url) return;
  setSyncStatus('busy', 'מסנכרן...');
  try {
    const res  = await fetch(url + '?t=' + Date.now(), { cache:'no-store' });
    const data = await res.json();
    if (data.ok) {
      serverState = data.state;
      // בדוק ניתוק
      const disconnected = data.disconnected || [];
      if (currentUser && !ADMIN_NAMES.includes(currentUser) && disconnected.includes(currentUser)) {
        localStorage.removeItem(SAVED_USER_KEY);
        currentUser = null; isAdmin = false;
        stopPolling();
        document.getElementById('user-badge').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('input-name').value = '';
        alert('נותקת מהמערכת על ידי מנהל. הזן שם מחדש.');
        return;
      }
      render(); setSyncStatus('ok', '✓ מעודכן');
    } else { setSyncStatus('error', '✗ שגיאה'); }
  } catch(e) { setSyncStatus('error', '✗ אין חיבור'); }
}

async function postAction(payload) {
  const url = getScriptUrl(); if (!url) return;
  setSyncStatus('busy', 'שולח...');
  try {
    const res  = await fetch(url, { method:'POST', body:JSON.stringify(payload) });
    const data = await res.json();
    if (data.ok) {
      serverState = data.state;
      render(); setSyncStatus('ok', '✓ נשמר');
    } else { setSyncStatus('error', '✗ ' + (data.error||'שגיאה')); }
  } catch(e) { setSyncStatus('error', '✗ אין חיבור'); }
}

function startPolling() { stopPolling(); pollTimer = setInterval(syncFromServer, POLL_INTERVAL); }
function stopPolling()  { if (pollTimer) clearInterval(pollTimer); }

/* ══ HELPERS ══ */
function findUserSlot() {
  for (const s of SLOTS) {
    if ((serverState[s.id]||[]).includes(currentUser)) return s.id;
  }
  return null;
}
function getRegisteredNames() {
  const names = new Set();
  SLOTS.forEach(s => (serverState[s.id]||[]).forEach(n => names.add(n)));
  return names;
}

/* ══ RENDER ══ */
function render() {
  ['morning','afternoon'].forEach(shift => {
    const grid = document.getElementById('grid-'+shift);
    if (!grid) return;
    grid.innerHTML = '';

    SLOTS.filter(s=>s.shift===shift).forEach(slot => {
      const agents = serverState[slot.id]||[];
      const isFull = agents.length >= slot.maxAgents;
      const meHere = agents.includes(currentUser);

      const card = document.createElement('div');
      card.className = 'slot-card'+(isFull?' full':'');
      card.dataset.slotId = slot.id;

      const timeEl = document.createElement('div');
      timeEl.className = 'slot-time';
      timeEl.innerHTML = `<bdi>${slot.time}</bdi>`;
      card.appendChild(timeEl);

      const capEl = document.createElement('div');
      capEl.className = 'slot-cap'+(isFull?' full-cap':'');
      capEl.textContent = isFull ? 'מלאה' : `${slot.maxAgents-agents.length}/${slot.maxAgents} פנויים`;
      card.appendChild(capEl);

      const ul = document.createElement('ul');
      ul.className = 'agent-list';
      agents.forEach(name => {
        const li  = document.createElement('li');
        const own = (name === currentUser);
        li.className = 'agent-badge'+(own?' own':'')+(isAdmin?' admin-view':'');
        li.draggable = own || isAdmin;
        li.textContent = name;

        const rb = document.createElement('button');
        rb.className = 'remove-btn';
        rb.textContent = '✕';
        rb.title = `הסר את ${name}`;
        rb.addEventListener('click', e => {
          e.stopPropagation();
          rb.textContent='...'; rb.disabled=true;
          card.classList.add('loading');
          if (isAdmin) postAction({ action:'adminRemove', slotId:slot.id, agentName:name, adminToken:ADMIN_TOKEN });
          else if (own) postAction({ action:'removeMe', slotId:slot.id, agentName:name });
        });
        li.appendChild(rb);

        li.addEventListener('dragstart', e => {
          draggedAgent=name; dragFromSlot=slot.id;
          setTimeout(()=>li.classList.add('dragging'),0);
          e.dataTransfer.effectAllowed='move';
        });
        li.addEventListener('dragend', ()=>{ li.classList.remove('dragging'); draggedAgent=null; dragFromSlot=null; });
        ul.appendChild(li);
      });
      card.appendChild(ul);

      card.addEventListener('dragover',  e=>{e.preventDefault();card.classList.add('drag-over');});
      card.addEventListener('dragleave', ()=>card.classList.remove('drag-over'));
      card.addEventListener('drop', e=>{
        e.preventDefault(); card.classList.remove('drag-over');
        if (!draggedAgent||dragFromSlot===slot.id) return;
        if ((serverState[slot.id]||[]).length>=slot.maxAgents) return;
        if (isAdmin) postAction({action:'move',fromSlot:dragFromSlot,toSlot:slot.id,agentName:draggedAgent,adminToken:ADMIN_TOKEN});
        else if (draggedAgent===currentUser) postAction({action:'addMe',slotId:slot.id,agentName:currentUser});
      });

      if (!meHere && !isFull && !isPlasmaWindow) {
        const addBtn = document.createElement('button');
        addBtn.className = 'btn-add-me';
        addBtn.textContent = 'הוסף אותי';
        addBtn.addEventListener('click', ()=>{
          addBtn.disabled=true;
          addBtn.innerHTML='<span class="spinner"></span> שומר...';
          postAction({action:'addMe',slotId:slot.id,agentName:currentUser});
        });
        card.appendChild(addBtn);
      }

      grid.appendChild(card);
    });
  });
  renderAdminPanel();
}

/* ══ ADMIN PANEL ══ */
function renderAdminPanel() {
  const panel = document.getElementById('admin-panel');
  const list  = document.getElementById('admin-slots-list');
  if (!isAdmin) { panel.style.display='none'; return; }
  panel.style.display='block';
  list.innerHTML='';

  SLOTS.forEach(slot => {
    const agents = serverState[slot.id]||[];
    const row = document.createElement('div');
    row.className='admin-slot-row';

    const h3 = document.createElement('h3');
    h3.textContent = `משבצת ${slot.label} — ${slot.time}  (${agents.length}/${slot.maxAgents})`;
    row.appendChild(h3);

    const wrap = document.createElement('div');
    wrap.className='admin-agents-wrap';

    agents.forEach(name => {
      const tag = document.createElement('span');
      tag.className='admin-agent-tag';

      const nameSpan = document.createElement('span');
      nameSpan.textContent = name;
      tag.appendChild(nameSpan);

      // ✏️ שינוי שם
      const renameBtn = document.createElement('button');
      renameBtn.className='admin-tag-btn rename';
      renameBtn.textContent='✏️'; renameBtn.title='שנה שם';
      renameBtn.addEventListener('click',()=>{
        const newName = prompt(`שנה שם עבור "${name}":`, name);
        if (!newName||newName.trim()===name) return;
        postAction({action:'adminRemove',slotId:slot.id,agentName:name,adminToken:ADMIN_TOKEN});
        setTimeout(()=>postAction({action:'adminAdd',slotId:slot.id,agentName:newName.trim(),adminToken:ADMIN_TOKEN}),600);
      });
      tag.appendChild(renameBtn);

      // ↔️ העברה
      const moveBtn = document.createElement('button');
      moveBtn.className='admin-tag-btn move';
      moveBtn.textContent='↔️'; moveBtn.title='העבר למשבצת אחרת';
      moveBtn.addEventListener('click',()=>{
        const MAP={'א':'A','ב':'B','ג':'C','ד':'D','ה':'E','ו':'F'};
        const opts=SLOTS.filter(s=>s.id!==slot.id).map(s=>`${s.label}: ${s.time}`).join('\n');
        const choice=prompt(`העבר את "${name}" לאיזו משבצת?\n\n${opts}\n\nהכנס אות (א/ב/ג/ד/ה/ו):`);
        if (!choice) return;
        const targetId=MAP[choice.trim()];
        if (!targetId||targetId===slot.id){alert('משבצת לא תקינה');return;}
        const ts=SLOTS.find(s=>s.id===targetId);
        if ((serverState[targetId]||[]).length>=ts.maxAgents){alert('המשבצת היעד מלאה');return;}
        postAction({action:'move',fromSlot:slot.id,toSlot:targetId,agentName:name,adminToken:ADMIN_TOKEN});
      });
      tag.appendChild(moveBtn);

      // 🔌 ניתוק
      const discBtn = document.createElement('button');
      discBtn.className='admin-tag-btn disconnect';
      discBtn.textContent='🔌'; discBtn.title='נתק משתמש — יצטרך להזין שם מחדש';
      discBtn.addEventListener('click',()=>{
        if (!confirm(`לנתק את "${name}"?\nהוא יצטרך להזין שם מחדש בכניסה הבאה.`)) return;
        postAction({action:'disconnectUser',agentName:name,adminToken:ADMIN_TOKEN});
      });
      tag.appendChild(discBtn);

      // ✕ הסרה מהמשבצת
      const rb = document.createElement('button');
      rb.className='admin-tag-btn remove';
      rb.textContent='✕'; rb.title='הסר מהמשבצת';
      rb.addEventListener('click',()=>postAction({action:'adminRemove',slotId:slot.id,agentName:name,adminToken:ADMIN_TOKEN}));
      tag.appendChild(rb);

      wrap.appendChild(tag);
    });
    row.appendChild(wrap);

    const addRow = document.createElement('div');
    addRow.className='admin-add-row';
    const inp = document.createElement('input');
    inp.placeholder='הוסף שם...'; inp.type='text';
    const addBtn = document.createElement('button');
    addBtn.textContent='הוסף';
    addBtn.addEventListener('click',()=>{
      const nm=inp.value.trim(); if (!nm) return;
      if (agents.length>=slot.maxAgents){alert('המשבצת מלאה');return;}
      postAction({action:'adminAdd',slotId:slot.id,agentName:nm,adminToken:ADMIN_TOKEN});
      inp.value='';
    });
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')addBtn.click();});
    addRow.appendChild(inp); addRow.appendChild(addBtn);
    row.appendChild(addRow);
    list.appendChild(row);
  });
}

/* ══ CSV ══ */
document.getElementById('btn-clear-all').addEventListener('click',()=>{
  if (!confirm('לנקות את כל ההפסקות?')) return;
  postAction({action:'clearAll',adminToken:ADMIN_TOKEN});
});
document.getElementById('btn-export-csv').addEventListener('click',()=>{
  let csv='\uFEFFמשבצת,שעות,שם\n';
  SLOTS.forEach(slot=>{
    const agents=serverState[slot.id]||[];
    if (!agents.length){csv+=`${slot.label},${slot.time},---\n`;return;}
    agents.forEach(n=>{csv+=`${slot.label},${slot.time},${n}\n`;});
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='schedule.csv'; a.click();
});
document.getElementById('btn-refresh').addEventListener('click',syncFromServer);

/* ══ CLOCK ══ */
function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=
    [n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
}
setInterval(updateClock,1000); updateClock();

/* ══ PLASMA ══ */
if (isPlasmaWindow){
  document.title='פלזמה | הפסקות';
  document.getElementById('plasma-resize').style.display='flex';
  document.getElementById('admin-panel').style.display='none';
  document.getElementById('login-screen').style.display='none';
  currentUser=PLASMA_NAME; isPlasma=true;
  document.getElementById('user-badge').textContent=PLASMA_NAME;
  document.getElementById('user-badge').style.display='inline';
}
document.getElementById('btn-plasma').addEventListener('click',()=>{
  const base=location.href.split('?')[0];
  window.open(`${base}?plasma=1`,'plasma',
    `top=0,left=${screen.width-500},width=480,height=340,resizable=yes,scrollbars=no`);
});

/* ══ LOGIN ══ */
function login(name){
  currentUser=name.trim();
  isAdmin =ADMIN_NAMES.includes(currentUser);
  isPlasma=(currentUser===PLASMA_NAME);
  if (!isAdmin) localStorage.setItem(SAVED_USER_KEY,currentUser);
  document.getElementById('login-screen').style.display='none';
  document.getElementById('user-badge').textContent=currentUser;
  document.getElementById('user-badge').style.display='inline';
  document.getElementById('btn-plasma').style.display=isPlasma?'inline-block':'none';
  document.getElementById('btn-logout').style.display=isAdmin?'inline-block':'none';
  render(); syncFromServer(); startPolling();
}

const loginWarn=document.getElementById('login-warning');
document.getElementById('btn-login').addEventListener('click',()=>{
  const name=document.getElementById('input-name').value.trim();
  if (!name) return;
  if (ADMIN_NAMES.includes(name)){login(name);return;}
  const myLocal=localStorage.getItem(SAVED_USER_KEY);
  const registered=getRegisteredNames();
  if (registered.has(name)&&myLocal!==name){
    loginWarn.style.display='block';
    loginWarn.textContent=`השם "${name}" כבר רשום ממכשיר אחר. פנה למנהל.`;
    return;
  }
  login(name);
});
document.getElementById('input-name').addEventListener('keydown',e=>{
  if(e.key==='Enter')document.getElementById('btn-login').click();
});
document.getElementById('btn-logout').addEventListener('click',()=>{
  stopPolling();
  currentUser=null; isAdmin=false; isPlasma=false; serverState={};
  document.getElementById('input-name').value='';
  document.getElementById('user-badge').style.display='none';
  document.getElementById('btn-plasma').style.display='none';
  document.getElementById('btn-logout').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  render();
});

/* ══ INIT ══ */
checkSetupBanner();
if (!isPlasmaWindow){
  const saved=localStorage.getItem(SAVED_USER_KEY);
  if (saved) login(saved);
  else syncFromServer();
} else { syncFromServer(); startPolling(); }
</script>
